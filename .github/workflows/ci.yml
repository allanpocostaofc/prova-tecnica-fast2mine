name: E-commerce QA — Robot Framework

# Gatilhos:
#  - push/PR na main: roda tudo (web + mobile) nos 3 ambientes.
#  - workflow_dispatch: execução manual com seleção de ambiente e suíte.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo"
        type: choice
        default: all
        options: [all, QA1, QA2, QA3]
      suite:
        description: "Suíte a executar"
        type: choice
        default: all
        options: [all, web, mobile]

# Segurança: token com o mínimo possível por padrão (apenas leitura do repo).
# O job de deploy eleva as permissões só onde precisa (ver abaixo).
permissions:
  contents: read

# Serializa deploys do Pages por ref e cancela runs supersedidas.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ----------------------------------------------------------------------------
  # setup — calcula a matriz (ambientes/suítes) a partir dos inputs do dispatch.
  # ----------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      envs: ${{ steps.matrix.outputs.envs }}
      run_web: ${{ steps.matrix.outputs.run_web }}
      run_mobile: ${{ steps.matrix.outputs.run_mobile }}
    steps:
      - id: matrix
        shell: bash
        env:
          IN_ENV: ${{ github.event.inputs.environment || 'all' }}
          IN_SUITE: ${{ github.event.inputs.suite || 'all' }}
        run: |
          set -euo pipefail
          if [ "$IN_ENV" = "all" ]; then
            envs='["QA1","QA2","QA3"]'
          else
            envs="[\"$IN_ENV\"]"
          fi
          case "$IN_SUITE" in
            web)    run_web=true;  run_mobile=false ;;
            mobile) run_web=false; run_mobile=true  ;;
            *)      run_web=true;  run_mobile=true   ;;
          esac
          {
            echo "envs=$envs"
            echo "run_web=$run_web"
            echo "run_mobile=$run_mobile"
          } >> "$GITHUB_OUTPUT"
          echo "Ambientes: $envs | web=$run_web mobile=$run_mobile"

  # ----------------------------------------------------------------------------
  # web — suíte desktop (Browser/Playwright). Matriz por ambiente.
  # ----------------------------------------------------------------------------
  web:
    needs: setup
    if: needs.setup.outputs.run_web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.setup.outputs.envs) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache navegadores do Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependências (web)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          rfbrowser init chromium   # só o engine usado, não os 3

      - name: Executar suíte WEB (${{ matrix.env }})
        continue-on-error: true
        run: |
          ENVL=$(echo "${{ matrix.env }}" | tr '[:upper:]' '[:lower:]')
          robot \
            --variable ENV:${{ matrix.env }} \
            --variable HEADLESS:True \
            --variablefile resources/variables/${ENVL}_vars.py \
            --outputdir results/web-${{ matrix.env }} \
            --name Web_${{ matrix.env }} \
            tests/web/

      - name: Publicar artefato (web-${{ matrix.env }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ matrix.env }}
          path: results/web-${{ matrix.env }}/
          retention-days: 7
          if-no-files-found: warn

  # ----------------------------------------------------------------------------
  # mobile — suíte Chrome no emulador Android (Appium). Matriz por ambiente.
  # Job mais pesado/frágil: KVM + emulador + Appium. Tolerante a falha.
  # ----------------------------------------------------------------------------
  mobile:
    needs: setup
    if: needs.setup.outputs.run_mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.setup.outputs.envs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Habilitar KVM (acelera o emulador)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências (mobile)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Executar suíte MOBILE (${{ matrix.env }})
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -no-boot-anim -gpu swiftshader_indirect -camera-back none
          script: |
            ENVL=$(echo "${{ matrix.env }}" | tr '[:upper:]' '[:lower:]')
            appium --port 4723 --log appium.log &
            npx wait-on -t 60000 http-get://127.0.0.1:4723/status
            robot \
              --variable ENV:${{ matrix.env }} \
              --variable AVD_NAME:test \
              --variable DEVICE_NAME:emulator-5554 \
              --variablefile resources/variables/${ENVL}_vars.py \
              --outputdir results/mobile-${{ matrix.env }} \
              --name Mobile_${{ matrix.env }} \
              tests/mobile/

      - name: Publicar artefato (mobile-${{ matrix.env }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-${{ matrix.env }}
          path: results/mobile-${{ matrix.env }}/
          retention-days: 7
          if-no-files-found: warn

  # ----------------------------------------------------------------------------
  # report — mescla os output.xml, gera dashboard e monta o site do Pages.
  # ----------------------------------------------------------------------------
  report:
    needs: [web, mobile]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências (relatório)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Baixar todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Mesclar resultados e gerar dashboard
        run: |
          set -euo pipefail
          mkdir -p site
          shopt -s globstar nullglob
          outputs=(artifacts/**/output.xml)
          if [ ${#outputs[@]} -eq 0 ]; then
            echo "Nenhum output.xml encontrado — gerando página de aviso."
            echo "<h1>Sem resultados nesta execução</h1>" > site/index.html
            touch site/.nojekyll
            exit 0
          fi
          echo "Mesclando ${#outputs[@]} arquivo(s) de resultado."
          rebot \
            --name "E-commerce QA" \
            --output site/output.xml \
            --report site/report.html \
            --log site/log.html \
            "${outputs[@]}"
          robotmetrics --inputpath site --output output.xml --metrics-report-name dashboard.html || true
          touch site/.nojekyll

      - name: Gerar landing page (index)
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-br">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>E-commerce QA — Robot Framework</title>
            <style>
              body{font-family:system-ui,Segoe UI,Arial,sans-serif;max-width:720px;
                   margin:48px auto;padding:0 16px;color:#1b1f24;line-height:1.5}
              h1{font-size:1.6rem} ul{list-style:none;padding:0}
              li{margin:12px 0} a{display:block;padding:16px 20px;border:1px solid #d0d7de;
                 border-radius:10px;text-decoration:none;color:#0969da;font-weight:600}
              a:hover{background:#f6f8fa} small{color:#57606a;font-weight:400;display:block}
            </style>
          </head>
          <body>
            <h1>E-commerce QA — Robot Framework</h1>
            <p>Resultados da execução automatizada (web + mobile, QA1/QA2/QA3).</p>
            <ul>
              <li><a href="dashboard.html">📊 Dashboard de métricas<small>Pass/fail por suíte, teste e keyword</small></a></li>
              <li><a href="report.html">📄 Relatório consolidado<small>Robot Framework report</small></a></li>
              <li><a href="log.html">🪵 Log detalhado<small>Passo a passo de cada teste</small></a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Empacotar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ----------------------------------------------------------------------------
  # deploy — publica no GitHub Pages. Único job com permissões elevadas.
  # ----------------------------------------------------------------------------
  deploy:
    needs: report
    if: github.ref == 'refs/heads/main' && always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
