name: E-commerce QA — Robot Framework

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo"
        type: choice
        default: all
        options: [all, QA1, QA2, QA3]

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      envs: ${{ steps.matrix.outputs.envs }}
    steps:
      - id: matrix
        shell: bash
        env:
          IN_ENV: ${{ github.event.inputs.environment || 'all' }}
        run: |
          set -euo pipefail
          if [ "$IN_ENV" = "all" ]; then
            envs='["QA1","QA2","QA3"]'
          else
            envs="[\"$IN_ENV\"]"
          fi
          echo "envs=$envs" >> "$GITHUB_OUTPUT"
          echo "Ambientes: $envs"

  web:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.setup.outputs.envs) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache navegadores do Playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependências (web)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          rfbrowser init chromium

      - name: Executar suíte WEB (${{ matrix.env }})
        run: |
          ENVL=$(echo "${{ matrix.env }}" | tr '[:upper:]' '[:lower:]')
          robot \
            --variable ENV:${{ matrix.env }} \
            --variable HEADLESS:True \
            --variablefile resources/variables/${ENVL}_vars.py \
            --outputdir results/web-${{ matrix.env }} \
            --name Web_${{ matrix.env }} \
            tests/web/

      - name: Publicar artefato (web-${{ matrix.env }})
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: web-${{ matrix.env }}
          path: results/web-${{ matrix.env }}/
          retention-days: 7
          if-no-files-found: warn

  gate:
    name: All tests passed
    needs: [web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verificar resultado da matriz
        run: |
          if [ "${{ needs.web.result }}" != "success" ]; then
            echo "Um ou mais ambientes falharam nos testes."
            exit 1
          fi
          echo "Todos os testes passaram."

  report:
    needs: [web, gate]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências (relatório)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Baixar todos os artefatos
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Copiar screenshots para o site (preservando por ambiente)
        run: |
          set -euo pipefail
          mkdir -p site/browser/screenshot
          for artifact_dir in artifacts/*/; do
            env_name=$(basename "$artifact_dir")
            screenshot_dir="$artifact_dir/browser/screenshot"
            [ -d "$screenshot_dir" ] || continue
            for png in "$screenshot_dir"/*.png; do
              [ -f "$png" ] || continue
              filename=$(basename "$png")
              new_name="${env_name}-${filename}"
              cp "$png" "site/browser/screenshot/$new_name"
              output_xml="$artifact_dir/output.xml"
              [ -f "$output_xml" ] && \
                sed -i "s|browser/screenshot/${filename}|browser/screenshot/${new_name}|g" "$output_xml"
            done
          done

      - name: Mesclar resultados e gerar dashboard
        run: |
          set -euo pipefail
          mkdir -p site
          shopt -s globstar nullglob
          outputs=(artifacts/**/output.xml)
          if [ ${#outputs[@]} -eq 0 ]; then
            echo "<h1>Sem resultados nesta execução</h1>" > site/index.html
            touch site/.nojekyll
            exit 0
          fi
          echo "Mesclando ${#outputs[@]} arquivo(s) de resultado."
          rebot \
            --nostatusrc \
            --name "E-commerce QA" \
            --output site/output.xml \
            --report site/report.html \
            --log site/log.html \
            "${outputs[@]}"
          robotmetrics --inputpath site --output output.xml --metrics-report-name dashboard.html || true
          touch site/.nojekyll

      - name: Gerar landing page (index)
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-br">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>E-commerce QA — Robot Framework</title>
            <style>
              body{font-family:system-ui,Segoe UI,Arial,sans-serif;max-width:720px;
                   margin:48px auto;padding:0 16px;color:#1b1f24;line-height:1.5}
              h1{font-size:1.6rem} ul{list-style:none;padding:0}
              li{margin:12px 0} a{display:block;padding:16px 20px;border:1px solid #d0d7de;
                 border-radius:10px;text-decoration:none;color:#0969da;font-weight:600}
              a:hover{background:#f6f8fa} small{color:#57606a;font-weight:400;display:block}
            </style>
          </head>
          <body>
            <h1>E-commerce QA — Robot Framework</h1>
            <p>Resultados da execução automatizada da suíte web (QA1/QA2/QA3).</p>
            <ul>
              <li><a href="dashboard.html">📊 Dashboard de métricas<small>Pass/fail por suíte, teste e keyword</small></a></li>
              <li><a href="report.html">📄 Relatório consolidado<small>Robot Framework report</small></a></li>
              <li><a href="log.html">🪵 Log detalhado<small>Passo a passo de cada teste</small></a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Empacotar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar relatório consolidado (download)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: relatorio-consolidado
          path: site/
          retention-days: 7
          if-no-files-found: warn

  deploy:
    needs: report
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
